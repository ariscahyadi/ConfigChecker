name: Check File Contains Line

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check submitted against base config
        id: check_line
        run: |
          SUBMITTED="submitted-config.txt"
          BASE="base-config.txt"

          if grep -Fxf "$BASE" "$SUBMITTED"; then
            echo "Line found."
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "Line not found."
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run only base config exists
        if: steps.check_line.outputs.found == 'true'
        run: echo "✅ The line exists in the file."

      - name: Run only if base config not exists
        if: steps.check_line.outputs.found == 'false'
        run: echo "❌ The line exists in not the file."

      - name: Run only if line does NOT exist
        if: steps.check_line.outputs.found == 'false'
        run: echo "❌ The line does not exist in the file."
