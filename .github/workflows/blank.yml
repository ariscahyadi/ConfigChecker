name: Check File Contains Line

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if file contains specific line
        id: check_line
        run: |
          FILE_PATH="submitted-config.txt"
          SEARCH_TEXT="hostname DSW1"

          if grep -Fxq "$SEARCH_TEXT" "$FILE_PATH"; then
            echo "Line found."
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "Line not found."
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run only if line exists
        if: steps.check_line.outputs.found == 'true'
        run: echo "✅ The line exists in the file."

      - name: Run only if line does NOT exist
        if: steps.check_line.outputs.found == 'false'
        run: echo "❌ The line does not exist in the file."
